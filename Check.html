<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通顯示屏</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .tab-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; border: none; border-radius: 5px; }
        .active { background: #f97316; }
        .data-box { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="tab-box">
    <button class="tab-btn active" onclick="show(1)">初始班車</button>
    <button class="tab-btn" onclick="show(2)">青馬班車</button>
</div>

<div id="tab1">
    <div id="bus-list-1">載入中...</div>
</div>

<div id="tab2" style="display:none;">
    <div id="bus-list-2">載入中...</div>
</div>

<script>
    function show(n) {
        document.getElementById('tab1').style.display = (n==1 ? 'block' : 'none');
        document.getElementById('tab2').style.display = (n==2 ? 'block' : 'none');
    }

    async function update() {
        // TAB 1 的原始數據請求 (保留你原本的邏輯)
        const stopIds = ["6C98380DB80A2A7B", "A63604C5A13E53AA", "17208E20FC5E0C25"];
        let html1 = '';
        for(let id of stopIds) {
            let res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${id}`);
            let json = await res.json();
            html1 += `<div class="data-box">${json.data ? '有數據' : '暫無'} - ${id}</div>`;
        }
        document.getElementById('bus-list-1').innerHTML = html1;

        // TAB 2 的青馬數據請求
        const bbiIds = ["DBB6D5D26FF3D909", "8394FFF35F9D2EFB"];
        let html2 = '';
        for(let id of bbiIds) {
            let res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${id}`);
            let json = await res.json();
            html2 += `<div class="data-box">青馬月台 ${id}: ${json.data ? '成功獲取' : '失敗'}</div>`;
        }
        document.getElementById('bus-list-2').innerHTML = html2;
    }
    update();
</script>
</body>
</html>
