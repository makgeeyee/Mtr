<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>除錯模式：檢查港鐵數據</title>
    <style>
        body { font-family: monospace; background: #0f172a; color: #fff; padding: 20px; font-size: 12px; }
        pre { background: #1e293b; padding: 10px; border-radius: 5px; overflow: auto; }
    </style>
</head>
<body>
    <h3>偵測 MTR API 回傳內容：</h3>
    <pre id="debug-log">連線中...</pre>

<script>
    async function debugMTR() {
        const log = document.getElementById('debug-log');
        try {
            const mtrUrl = 'https://rt.data.gov.hk/v1/transport/mtr/getETA.php?line=KTL&station=SKM';
            const response = await fetch('https://corsproxy.io/?' + encodeURIComponent(mtrUrl));
            const json = await response.json();
            
            // 直接顯示原始 JSON 結構
            log.innerText = JSON.stringify(json, null, 2);
            
            if (!json.data) {
                log.innerText += "\n\n錯誤：API 回傳的數據結構中沒有 'data' 欄位。";
            } else if (!json.data["KTL-SKM"]) {
                log.innerText += "\n\n錯誤：data 裡面找不到 'KTL-SKM'，可能站點代碼錯誤。";
            }
        } catch (e) {
            log.innerText = "無法獲取數據: " + e.message;
        }
    }
    debugMTR();
</script>
</body>
</html>
