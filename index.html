<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機場快綫巴士即時到站顯示屏</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f172a; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            background: #1e293b; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            padding: 20px; 
            width: 100%; 
            max-width: 450px; 
            border-top: 8px solid #f97316; 
        }
        h1 { 
            color: #f8fafc; 
            margin: 0 0 5px 0; 
            font-size: 20px; 
            text-align: center;
            letter-spacing: 1px;
        }
        .update-time { 
            font-size: 12px; 
            color: #94a3b8; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .bus-route-box { 
            background: #0f172a; 
            border: 1px solid #334155; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
        }
        .bus-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #334155; 
            padding-bottom: 8px; 
            margin-bottom: 10px; 
        }
        .route-num { 
            font-size: 26px; 
            font-weight: 900; 
            color: #f97316; 
            background: #292524;
            padding: 2px 10px;
            border-radius: 6px;
        }
        .route-dest { 
            font-size: 13px; 
            color: #f1f5f9; 
            font-weight: 600; 
            text-align: right; 
        }
        .station-loc { 
            font-size: 11px; 
            color: #38bdf8; 
            display: block; 
            margin-top: 3px; 
        }
        .eta-list { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
        }
        .eta-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 0; 
            font-size: 15px; 
            border-bottom: 1px dashed #1e293b;
        }
        .eta-item:last-child { border-bottom: none; }
        .eta-time { 
            color: #94a3b8; 
            font-size: 14px; 
        }
        .eta-countdown { 
            font-weight: bold; 
            color: #38bdf8; 
            font-family: monospace;
            font-size: 16px;
        }
        .next-bus { 
            color: #facc15; 
        }
        .loading { 
            text-align: center; 
            color: #94a3b8; 
            padding: 30px; 
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✈️ 機場巴士實時顯示屏</h1>
    <div class="update-time" id="update-time">最後更新: 正在初始化...</div>
    <div id="content">
        <div class="loading">正在優化巴士數據庫，請稍候...</div>
    </div>
</div>

<script>
    let config = [
        { route: "A41P", dir: "O", seq: 1, title: "往 機場 (地面運輸中心)", stopName: "烏溪沙站", stopId: "BA72214DFE48AA86" },
        { route: "A41P", dir: "I", seq: 1, title: "往 烏溪沙站", stopName: "機場 (地面運輸中心)", stopId: null },
        { route: "E42",  dir: "I", seq: 1, title: "往 沙田 (博康)", stopName: "機場 (地面運輸中心)", stopId: null }
    ];

    async function autoDiscoverStopIds() {
        for (let bus of config) {
            if (!bus.stopId) {
                try {
                    let bound = bus.dir === "O" ? "outbound" : "inbound";
                    let url = `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${bus.route}/${bound}/1`;
                    let res = await fetch(url);
                    let json = await res.json();
                    
                    let target = json.data.find(item => parseInt(item.seq) === bus.seq);
                    if (target) {
                        bus.stopId = target.stop;
                    }
                } catch (e) {
                    console.error(`自動抓取 ${bus.route} 車站 ID 失敗:`, e);
                }
            }
        }
    }

    async function fetchAllETA() {
        const contentDiv = document.getElementById('content');
        let htmlContent = '';
        const now = new Date();
        
        document.getElementById('update-time').innerText = `最後更新: ${now.toLocaleTimeString()}`;

        for (const bus of config) {
            if (!bus.stopId) {
                htmlContent += `
                    <div class="bus-route-box">
                        <div class="bus-header"><span class="route-num">${bus.route}</span></div>
                        <div class="loading" style="padding:10px;">密鑰解鎖中...</div>
                    </div>`;
                continue;
            }

            try {
                const url = `https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${bus.stopId}`;
                const response = await fetch(url);
                const json = await response.json();
                
                let rawList = json.data.filter(item => item.route === bus.route && item.dir === bus.dir && item.eta);

                // 按時間排序
                rawList.sort((a, b) => new Date(a.eta) - new Date(b.eta));

                // 【核心修正】強力去重：確保同一個時間只會出現一次，消滅影分身！
                let seenTimes = new Set();
                let etaList = [];
                for (let item of rawList) {
                    let timeStr = item.eta.substring(11, 16);
                    if (!seenTimes.has(timeStr)) {
                        seenTimes.add(timeStr);
                        etaList.push(item);
                    }
                }

                htmlContent += `
                    <div class="bus-route-box">
                        <div class="bus-header">
                            <span class="route-num">${bus.route}</span>
                            <div class="route-dest">
                                <div>${bus.title}</div>
                                <span class="station-loc">📍 ${bus.stopName}</span>
                            </div>
                        </div>
                        <ul class="eta-list">
                `;

                if (etaList.length === 0) {
                    htmlContent += `<li class="eta-item" style="color:#64748b;justify-content:center;padding:10px 0;">暫時未有班次資料</li>`;
                } else {
                    // 顯示最多 3 班真正不同的車
                    etaList.slice(0, 3).
