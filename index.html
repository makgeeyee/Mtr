<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>烏溪沙站即時班次 (雙重保障版)</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-top: 8px solid #9a3820; margin-bottom: 20px; }
        h2 { margin-top: 0; color: #333; text-align: center; font-size: 20px; }
        .time { font-size: 13px; color: #666; text-align: center; margin-bottom: 15px; }
        .train { background: #f8f9fa; border-left: 5px solid #28a745; padding: 12px; margin: 8px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .platform { background: #e9ecef; padding: 3px 8px; border-radius: 10px; font-size: 12px; }
        .countdown { font-weight: bold; color: #007bff; font-size: 18px; }
        .waiting { text-align: center; color: #888; padding: 15px; font-style: italic; font-size: 14px; }
        iframe { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 450px; height: 550px; }
    </style>
</head>
<body>

<div class="card">
    <h2>烏溪沙站 (數據版)</h2>
    <p id="time" class="time">正在載入...</p>
    <div id="list"></div>
</div>

<iframe src="https://www.mtr.com.hk/archive/ch/services/nexttrain/index.html?line=TML&station=WKS" scrolling="no"></iframe>

<script>
    const url = "https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TML&sta=WKS";

    async function checkMTR() {
        try {
            const res = await fetch(url);
            const json = await res.json();
            
            const stationData = json.data["TML-WKS"];
            document.getElementById('time').innerText = "最後更新: " + (stationData.curr_time || new Date().toLocaleTimeString());
            
            const trains = stationData.DOWN || [];
            
            if(trains.length === 0) {
                document.getElementById('list').innerHTML = `<div class="waiting">API 暫時未有數據回傳。<br><span style="font-size:12px;color:#aaa;">請參考下方官方顯示屏 👇</span></div>`;
                return;
            }
            
            let html = "";
            trains.forEach(t => {
                let minutes = t.ttnt === "0" ? "即將開出" : `${t.ttnt} 分鐘`;
                html += `<div class="train">
                    <div>
                        <b>往 屯門</b><br>
                        <span style="font-size: 12px; color: #666;">開出時間: ${t.time.substring(11,16)}</span>
                    </div>
                    <div style="text-align: right;">
                        <span class="platform">${t.plat} 號月台</span>
                        <div class="countdown">${minutes}</div>
                    </div>
                </div>`;
            });
            document.getElementById('list').innerHTML = html;
            
        } catch(e) {
            document.getElementById('list').innerHTML = "<div class="waiting">API 連線受阻，請看下方官方顯示屏 👇</div>";
        }
    }

    checkMTR();
    setInterval(checkMTR, 20000);
</script>

</body>
</html>
