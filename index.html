<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機場巴士即時到站</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            padding: 25px;
            width: 100%;
            max-width: 450px;
            border-top: 10px solid #ff5a00; /* 龍運橙色 */
        }
        h1 {
            color: #1d1d1f;
            margin: 0 0 5px 0;
            font-size: 22px;
            text-align: center;
        }
        .update-time {
            font-size: 13px;
            color: #86868b;
            text-align: center;
            margin-bottom: 20px;
        }
        .bus-route-box {
            background: #fbfbfd;
            border: 1px solid #d2d2d7;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
        }
        .bus-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e8e8ed;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .route-num {
            font-size: 24px;
            font-weight: bold;
            color: #ff5a00;
        }
        .route-dest {
            font-size: 13px;
            color: #1d1d1f;
            font-weight: 600;
            text-align: right;
        }
        .station-loc {
            font-size: 11px;
            color: #86868b;
            display: block;
            margin-top: 2px;
        }
        .eta-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .eta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 15px;
        }
        .eta-time {
            color: #86868b;
            font-size: 13px;
        }
        .eta-countdown {
            font-weight: bold;
            color: #0071e3;
        }
        .eta-countdown.next-bus {
            color: #ff9500;
        }
        .loading {
            text-align: center;
            color: #86868b;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>機場巴士 到站時間</h1>
    <div class="update-time" id="update-time">最後更新: 載入中...</div>
    <div id="content">
        <div class="loading">正在獲取巴士數據...</div>
    </div>
</div>

<script>
    // 修正：將所有 stopId 改回小寫，符合九巴 API 規範
    const config = [
        { 
            route: "A41P", 
            title: "往 機場 (地面運輸中心)", 
            stopName: "烏溪沙站總站",
            stopId: "wu-kai-sha-station-bus-terminus", 
            dir: "O" 
        },
        { 
            route: "A41P", 
            title: "往 烏溪沙站", 
            stopName: "機場 (地面運輸中心)",
            stopId: "airport-ground-transportation-centre", 
            dir: "I" 
        },
        { 
            route: "E42", 
            title: "往 沙田 (博康邨)", 
            stopName: "機場 (地面運輸中心)",
            stopId: "airport-ground-transportation-centre", 
            dir: "I" 
        }
    ];

    async function fetchAllETA() {
        const contentDiv = document.getElementById('content');
        let htmlContent = '';
        const now = new Date();
        
        document.getElementById('update-time').innerText = `最後更新: ${now.toLocaleTimeString()}`;

        for (const bus of config) {
            try {
                const url = `https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${bus.stopId}`;
                const response = await fetch(url);
                const json = await response.json();
                
                // 篩選對應路線與方向
                const etaList = json.data.filter(item => item.route === bus.route && item.dir === bus.dir);

                htmlContent += `
                    <div class="bus-route-box">
                        <div class="bus-header">
                            <span class="route-num">${bus.route}</span>
                            <div class="route-dest">
                                <div>${bus.title}</div>
                                <span class="station-loc">📍 ${bus.stopName}</span>
                            </div>
                        </div>
                        <ul class="eta-list">
                `;

                if (etaList.length === 0 || !etaList[0].eta) {
                    htmlContent += `<li class="eta-item" style="color:#86868b;">暫時未有班次資料</li>`;
                } else {
                    // 顯示最多 2 班車
                    etaList.slice(0, 2).forEach((item, index) => {
                        const etaTime = new Date(item.eta);
                        const diffMs = etaTime - now;
                        const diffMins = Math.max(0, Math.floor(diffMs / 1000 / 60));
                        
                        let countdownStr = diffMins === 0 ? "即將開出" : `${diffMins} 分鐘`;
                        let timeStr = item.eta.substring(11, 16);

                        htmlContent += `
                            <li class="eta-item">
                                <span class="eta-time">預計時間: ${timeStr}</span>
                                <span class="eta-countdown ${index === 0 ? 'next-bus' : ''}">${countdownStr}</span>
                            </li>
                        `;
                    });
                }

                htmlContent += `</ul></div>`;

            } catch (error) {
                console.error(error);
                htmlContent += `
                    <div class="bus-route-box">
                        <div class="bus-header"><span class="route-num">${bus.route}</span></div>
                        <div style="color:red; font-size:13px;">資料連線失敗</div>
                    </div>
                `;
            }
        }

        contentDiv.innerHTML = htmlContent;
    }

    // 啟動
    fetchAllETA();
    // 每 30 秒自動刷新
    setInterval(fetchAllETA, 30000);
</script>

</body>
</html>
