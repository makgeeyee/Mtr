<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>烏溪沙站即時到站班次</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-top: 8px solid #9a3820; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .time { font-size: 13px; color: #666; text-align: center; margin-bottom: 20px; }
        .train { background: #f8f9fa; border-left: 5px solid #28a745; padding: 15px; margin: 10px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .platform { background: #e9ecef; padding: 3px 8px; border-radius: 10px; font-size: 12px; }
        .countdown { font-weight: bold; color: #007bff; font-size: 18px; }
        .waiting { text-align: center; color: #888; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>烏溪沙站 班次顯示</h2>
    <p id="time" class="time">正在載入...</p>
    <div id="list"></div>
</div>

<script>
    // 轉返去烏溪沙站 (WKS)
    const url = "https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TML&sta=WKS";

    async function checkMTR() {
        try {
            const res = await fetch(url);
            const json = await res.json();
            
            const stationData = json.data["TML-WKS"];
            document.getElementById('time').innerText = "最後更新: " + stationData.curr_time;
            
            // 總站開出屬於 DOWN (下行往屯門)
            const trains = stationData.DOWN || [];
            
            if(trains.length === 0) {
                // 優化提示：等使用者知道程式冇死，純粹係總站咁啱未有車
                document.getElementById('list').innerHTML = `<div class="waiting">暫時未有即將開出班次。<br><span style="font-size:12px;color:#aaa;">(總站列車調動中，請等候 20 秒自動刷新)</span></div>`;
                return;
            }
            
            let html = "";
            trains.forEach(t => {
                let minutes = t.ttnt === "0" ? "即將開出" : `${t.ttnt} 分鐘`;
                html += `<div class="train">
                    <div>
                        <b>往 屯門</b><br>
                        <span style="font-size: 12px; color: #666;">開出時間: ${t.time.substring(11,16)}</span>
                    </div>
                    <div style="text-align: right;">
                        <span class="platform">${t.plat} 號月台</span>
                        <div class="countdown">${minutes}</div>
                    </div>
                </div>`;
            });
            document.getElementById('list').innerHTML = html;
            
        } catch(e) {
            document.getElementById('list').innerHTML = "<div style='color:red;'>連線出錯: " + e + "</div>";
        }
    }

    checkMTR();
    setInterval(checkMTR, 20000); // 每 20 秒自動更新
</script>

</body>
</html>
