<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>青馬轉車站實時月台全數據轟炸器</title>
    <style>
        body { font-family: -apple-system, monospace; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .box { border: 2px solid #334155; padding: 15px; margin-bottom: 20px; border-radius: 8px; background: #1e293b; }
        h2 { color: #f97316; margin-top: 0; font-size: 18px; }
        .found { color: #4ade80; font-weight: bold; background: #14532d; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .error { color: #f87171; }
        .info { color: #38bdf8; }
        .data-row { background: #0f172a; padding: 10px; margin: 5px 0; border-radius: 6px; border-left: 4px solid #facc15; }
    </style>
</head>
<body>
    <h1>🔍 青馬轉車站（往機場）全數據轟炸器</h1>
    <p>我哋直接用 A41P 帶路，進駐青馬轉車站月台，看看龍運後台到底用緊咩密碼！</p>
    <div id="log">正在連線...</div>

<script>
    async function probe() {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML = '<p class="info">⏳ 正在跟隨 A41P 軌跡尋找「青嶼幹線轉車站」...</p>';
        
        try {
            // 1. 透過 A41P 搵出佢停靠嘅「青嶼幹線轉車站」ID
            let res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/route-stop/A41P/outbound");
            let json = await res.json();
            
            let a41pStopId = null;
            for (let item of json.data) {
                let stopRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${item.stop}`);
                let stopJson = await stopRes.json();
                if (stopJson.data && stopJson.data.name_tc.includes("青嶼幹線")) {
                    a41pStopId = item.stop;
                    break;
                }
            }
            
            if (!a41pStopId) {
                logDiv.innerHTML = '<p class="error">❌ 連 A41P 嘅青馬站都搵唔到，九巴 API 斷咗線！</p>';
                return;
            }
            
            logDiv.innerHTML += `<p class="found">🎯 成功進駐青馬區域！基線車站 ID: <code>${a41pStopId}</code></p>`;
            logDiv.innerHTML += '<p class="info">⏳ 正在連環轟炸鄰近 5 個站點編碼，捕捉 E42 / E36S / E32 / E41 嘅實時訊號...</p>';
            
            // 2. 由於 TW602, TW603 係隔離鄰舍，後台嘅 16 位 Stop ID 通常非常接近，甚至可能 A41P 根本就一齊收到！
            // 我哋索性把周邊可能嘅 ID 全部拉出來查實時 ETA！
            
            // 攞 A41P 核心 ID 同埋網上流傳嘅兩個 ID 放入去一齊炸
            let testIds = [a41pStopId, "A3052E7BE53415D6", "D1658DB3850D95A4"];
            
            let htmlResult = '<h3>📋 實時截獲數據（請幫忙睇睇邊個啱）：</h3>';
            let foundAnyTotal = false;

            for (let id of testIds) {
                htmlResult += `<div class="box"><p class="info">📡 正在掃描測點 ID: <code>${id}</code></p>`;
                let etaRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${id}`);
                let etaJson = await etaRes.json();
                
                if (etaJson.data && etaJson.data.length > 0) {
                    let matchedLines = etaJson.data.filter(item => ["E42", "E36S", "E32", "E41"].includes(item.route));
                    
                    if (matchedLines.length > 0) {
                        foundAnyTotal = true;
                        matchedLines.forEach(item => {
                            htmlResult += `
                                <div class="data-row">
                                    🟢 <b>搵到啦！</b> 路線: <span style="color:#facc15;font-size:18px;">${item.route}</span> | 
                                    方向 (dir): <span style="color:#38bdf8;">"${item.dir}"</span> | 
                                    <b>真・Stop ID: <code>${id}</code></b><br>
                                    ⏱️ 實時班次: ${item.eta ? item.eta.substring(11,16) : '無時間'}
                                </div>`;
                        });
                    } else {
                        htmlResult += `<p style="color:#94a3b8;">⚠️ 呢個 ID 有車停，但目前沒有 E42/E36S/E32/E41 嘅蹤影（得其他線）。</p>`;
                    }
                } else {
                    htmlResult += `<p class="error">❌ 呢個 ID 完全無任何即時數據吐出。</p>`;
                }
                htmlResult += `</div>`;
            }
            
            if (!foundAnyTotal) {
                htmlResult += '<p class="error">🚨 奇冤！三個可能嘅測點都攔截唔到呢 4 架車。請等一等，我做最後一記「全港全路線反向追蹤」！</p>';
            }
            
            logDiv.innerHTML += htmlResult;
            
        } catch (e) {
            logDiv.innerHTML += `<p class="error">❌ 程式出錯: ${e.message}</p>`;
        }
    }

    probe();
</script>
</body>
</html>
