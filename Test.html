<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青馬轉車站實時顯示屏</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #1e293b; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); padding: 20px; width: 100%; max-width: 450px; border-top: 8px solid #f97316; }
        h1 { color: #f8fafc; margin: 0 0 5px 0; font-size: 19px; text-align: center; letter-spacing: 1px; }
        .update-time { font-size: 12px; color: #94a3b8; text-align: center; margin-bottom: 20px; }
        .data-box { background: #0f172a; border: 1px solid #334155; padding: 15px; margin-bottom: 15px; border-radius: 12px; }
        .data-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 10px; }
        .badge { font-size: 13px; font-weight: bold; color: #fff; padding: 3px 10px; border-radius: 20px; background: #f97316; }
        .dest-title { font-size: 14px; color: #f1f5f9; font-weight: bold; text-align: right; }
        .eta-list { list-style: none; padding: 0; margin: 0; }
        .eta-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 15px; border-bottom: 1px dashed #1e293b; }
        .eta-item:last-child { border-bottom: none; }
        .sub-text { color: #94a3b8; font-size: 13px; }
        .countdown { font-weight: bold; color: #38bdf8; font-family: monospace; font-size: 16px; }
        .next-one { color: #facc15; }
        .loading { text-align: center; color: #94a3b8; padding: 30px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>✈️ 青馬轉車站實時顯示屏</h1>
    <div class="update-time" id="update-time">最後更新: 正在初始化...</div>
    <div id="content"><div class="loading">正在連線九巴/龍運原生數據庫...</div></div>
</div>

<script>
    // 採用你親自抓出來的真實 16 位數據庫 ID
    const busPlatforms = [
        { id: "DBB6D5D26FF3D909", name: "TW602 月台", routes: ["E42", "E36S"] },
        { id: "8394FFF35F9D2EFB", name: "TW603 月台", routes: ["E32", "E41"] }
    ];

    async function refreshBusData() {
        const contentDiv = document.getElementById('content');
        const now = new Date();
        document.getElementById('update-time').innerText = `最後更新: ${now.toLocaleTimeString()}`;

        let html = '';

        for (let plat of busPlatforms) {
            try {
                // 🔴 關鍵改動：學 hkbushub 咁直接 fetch 原生網址，完全唔加 Proxy
                const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${plat.id}`);
                const json = await response.json();
                
                plat.routes.forEach(route => {
                    let rawList = [];
                    if (json && json.data) {
                        rawList = json.data.filter(item => item.route === route && item.eta);
                    }
                    
                    // 排序
                    rawList.sort((a,b) => new Date(a.eta) - new Date(b.eta));
                    
                    // 去除重覆分鐘
                    let etaList = [];
                    rawList.forEach(item => {
                        let diff = Math.max(0, Math.floor((new Date(item.eta) - now) / 1000 / 60));
                        if (!etaList.some(ex => Math.abs(Math.max(0, Math.floor((new Date(ex.eta) - now)/1000/60)) - diff) <= 1)) {
                            etaList.push(item);
                        }
                    });

                    html += `<div class="data-box">
                        <div class="data-header">
                            <span class="badge">${route}</span>
                            <span class="dest-title">${plat.name} 往機場/國泰城</span>
                        </div>
                        <ul class="eta-list">`;
                    
                    if(etaList.length === 0) {
                        html += `<li class="eta-item" style="color:#64748b;justify-content:center;">暫無班次</li>`;
                    } else {
                        etaList.slice(0, 2).forEach((item, index) => {
                            let diffMins = Math.max(0, Math.floor((new Date(item.eta) - now) / 1000 / 60));
                            let countdownStr = diffMins === 0 ? "即將到站" : `${diffMins} MINS`;
                            html += `<li class="eta-item">
                                <span class="sub-text">⏱️ 預計: ${item.eta.substring(11,16)}</span>
                                <span class="countdown ${index===0?'next-one':''}">${countdownStr}</span>
                            </li>`;
                        });
                    }
                    html += `</ul></div>`;
                });
            } catch(e) {
                console.error(e);
                html += `<div class="loading" style="color:#ef4444;">${plat.name} 原生連線失敗</div>`;
            }
        }
        contentDiv.innerHTML = html;
    }

    refreshBusData();
    setInterval(refreshBusData, 30000);
</script>
</body>
</html>
