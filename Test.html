<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機場巴士實時轉乘顯示屏</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f172a; 
            margin: 0; 
            padding: 10px; 
            color: #f1f5f9;
        }
        .container { 
            max-width: 450px; 
            margin: 0 auto; 
        }
        h1 { 
            font-size: 18px; 
            text-align: center; 
            margin: 10px 0; 
            color: #f97316;
        }
        .section-title {
            font-size: 14px;
            font-weight: bold;
            padding: 5px 10px;
            background: #1e293b;
            border-left: 4px solid #facc15;
            margin-top: 15px;
            margin-bottom: 5px;
            border-radius: 0 4px 4px 0;
        }
        /* 官方顯示屏容器 */
        .kmb-frame-box {
            width: 100%;
            height: 280px; /* 剛好容納路線同頭三班車 */
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            margin-bottom: 10px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✈️ 青馬轉車站（往機場方向）官方即時屏</h1>

    <div class="section-title">🚌 TW602 月台 (E42, E36S 往機場/國泰城)</div>
    <div class="kmb-frame-box">
        <iframe src="https://search.kmb.hk/KMBWebSite/page.aspx?mode=eta&stop=TW06-T-1000-0"></iframe>
    </div>

    <div class="section-title">🚌 TW603 月台 (E32, E41 往航天城/國泰城)</div>
    <div class="kmb-frame-box">
        <iframe src="https://search.kmb.hk/KMBWebSite/page.aspx?mode=eta&stop=TW06-T-1050-0"></iframe>
    </div>
</div>

</body>
</html>
