<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>青馬轉車站密碼探測器</title>
    <style>
        body { font-family: monospace; background: #111; color: #fff; padding: 20px; }
        .route-block { border: 1px solid #444; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        h2 { color: #f97316; margin-top: 0; }
        .match { color: #4ade80; font-weight: bold; background: #14532d; padding: 2px 5px; }
        .loading { color: #888; }
    </style>
</head>
<body>
    <h1>🔍 青馬轉車站（往機場方向）真・密碼探測器</h1>
    <p>正在實時向九巴數據庫索取路線圖，請稍候...</p>
    <div id="log"></div>

<script>
    const routes = [
        { name: "E42", bound: "inbound" },
        { name: "E36S", bound: "inbound" },
        { name: "E32", bound: "inbound" },
        { name: "E41", bound: "inbound" }
    ];

    async function probe() {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML = '';

        for (let r of routes) {
            let html = `<div class="route-block"><h2>巴士路線: ${r.name} (往機場/航天城方向)</h2>`;
            try {
                // 1. 先拿整條線的所有車站列表
                let res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${r.name}/${r.bound}`);
                let json = await res.json();
                
                if (!json.data || json.data.length === 0) {
                    html += `<p style="color:#ef4444;">❌ 找不到這條路線的數據，可能方向(Bound)定義不對</p></div>`;
                    logDiv.innerHTML += html;
                    continue;
                }

                html += `<ul>`;
                // 2. 逐個站抓名字，找出「青嶼幹線」
                for (let stopInfo of json.data) {
                    let stopRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${stopInfo.stop}`);
                    let stopJson = await stopRes.json();
                    let stopName = stopJson.data.name_tc;

                    if (stopName.includes("青嶼幹線")) {
                        html += `<li class="match">👉 站序: ${stopInfo.seq} | 車站: ${stopName} | Stop ID (真密碼): ${stopInfo.stop} 👈</li>`;
                    } else {
                        html += `<li style="color:#666;">站序: ${stopInfo.seq} | 車站: ${stopName}</li>`;
                    }
                }
                html += `</ul></div>`;
            } catch (e) {
                html += `<p style="color:#ef4444;">連線出錯: ${e.message}</p></div>`;
            }
            logDiv.innerHTML += html;
        }
    }

    probe();
</script>
</body>
</html>
